music: /assets/images/og-album-2025.jpg
self-titled-2025: /assets/images/og-album-2025.jpg
magisches-theater: /assets/images/og-album-2024.jpg
lyrics: /assets/images/og-lyrics.jpg
musings: /assets/images/og-musings.jpg
lyrics-acoustic: /assets/images/og-album-2020.jpg
lyrics-child: /assets/images/og-album-2025.jpg
lyrics-magisches-theater: /assets/images/og-album-2024.jpg
