# Maps a page `ref` to its 1200x630 share card(s) in assets/images/, built by
# scripts/build-og-cards.js. _includes/meta.html looks pages up here: a German
# page uses the entry's `de` card when present, otherwise `en` serves both
# languages. A ref that's absent falls back to site.og_image_default
# (og-default.jpg, the home card) — intentional for `home` and the individual
# musings essays. Any page can still override with its own `image:` front matter.
about:    { en: /assets/images/og-about.jpg,   de: /assets/images/og-about-de.jpg }
music:    { en: /assets/images/og-music.jpg,   de: /assets/images/og-music-de.jpg }
contact:  { en: /assets/images/og-contact.jpg, de: /assets/images/og-contact-de.jpg }
live:     { en: /assets/images/og-live.jpg }
lyrics:   { en: /assets/images/og-lyrics.jpg }
musings:  { en: /assets/images/og-musings.jpg }
self-titled-2025:         { en: /assets/images/og-album-2025.jpg }
magisches-theater:        { en: /assets/images/og-album-2024.jpg }
lyrics-acoustic:          { en: /assets/images/og-album-2020.jpg }
lyrics-child:             { en: /assets/images/og-album-2025.jpg }
lyrics-magisches-theater: { en: /assets/images/og-album-2024.jpg }
