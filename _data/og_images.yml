# Maps a page `ref` (shared by an EN page and its DE twin) to its 1200x630 share
# card in assets/images/, generated by scripts/build-og-cards.js. _includes/meta.html
# looks pages up here, so one entry covers both languages. A ref that's absent
# falls back to site.og_image_default (og-default.jpg, the home band photo); that
# is intentional for `home`, `contact`, and the individual musings essays. Any
# page can still override with its own `image:` front matter.
