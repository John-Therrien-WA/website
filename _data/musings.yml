- category: Essay
  title: "The Great Peace Filter"
  url: /musings/the-great-peace-filter.html
  place: Berlin
  date: January 2026
  read_time: 8 min read
  subtitle: "Where is Everybody?"
  body: "Scientific culture has given a name and structure to the age-old question of whether or not we are cosmically alone in the universe. The Fermi Paradox may read as follows:"
  quote: "Given the age and size of the universe, why do we see no evidence of extraterrestrial civilizations?"
