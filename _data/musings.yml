# Musings listing — single source of truth for the index at /musings.html.
# Each record is one text. `category` drives BOTH the displayed label and the
# "Read the full <CATEGORY>" CTA, so the two can never diverge — the copy-paste
# bug where the CTA said the wrong type is now structurally impossible.
#
# To add a musing: create the page under musings/, then add a record here
# (newest first). Optional fields: subtitle, quote. Body/subtitle/quote may
# contain inline HTML entities (e.g. &rsquo;) — they are emitted as-is.
#
# Categories in use: Advertisement, Zen Story, Essay, Dialogue.

