- category: Essay
  title: "The Coherence of Craft and Taste"
  url: /musings/the-coherence-of-craft-and-taste.html
  place: Berlin
  date: February 2026
  read_time: 3 min read
  subtitle: "On craft, perception, and the prompt genius"
  body: "Refined musical judgment doesn&rsquo;t emerge from detached curation alone, but from long, immersive engagement with making music. The deeper concern with generative AI isn&rsquo;t derivative slop; it&rsquo;s that the tool may let people bypass the slow formation of perceptual sensitivity altogether."

