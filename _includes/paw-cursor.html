<!-- Playful gimmick (Impressum + Datenschutz only): gold animal paw prints
     trail the cursor and gently fade out. Desktop pointers only; honours
     reduced-motion. Pointer-events: none, so links stay clickable. Self-
     contained; the small paw-drawing helpers are intentionally duplicated
     from the intro so this stays an isolated, page-scoped enhancement. -->
<style>
  .paw-cursor {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
    /* Promote to its own GPU layer so the transparent overlay composites
       smoothly over the page text instead of repainting with it. */
    transform: translateZ(0);
    will-change: transform;
  }
  @media (prefers-reduced-motion: reduce) { .paw-cursor { display: none; } }
</style>

<canvas id="paw-cursor" class="paw-cursor" aria-hidden="true"></canvas>

<script>
  (function () {
    var canvas = document.getElementById('paw-cursor');
    if (!canvas) return;
    var hover = !window.matchMedia || window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!hover || reduce) { canvas.style.display = 'none'; return; }

    var ctx = canvas.getContext('2d'), W, H, dpr;
    var GOLD = (getComputedStyle(document.documentElement)
                  .getPropertyValue('--color-accent') || '#a88d2e').trim();

    function size() {
      dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W * dpr; canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    size();
    window.addEventListener('resize', size);

    function rand(a, b) { return a + Math.random() * (b - a); }
    function ellipse(cx, cy, rx, ry) {
      ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.fill();
    }
    function wolf(s) {
      ellipse(0, 0.45 * s, 0.50 * s, 0.58 * s);
      ellipse(-0.46 * s, -0.22 * s, 0.17 * s, 0.27 * s);
      ellipse(-0.16 * s, -0.50 * s, 0.17 * s, 0.29 * s);
      ellipse(0.16 * s, -0.50 * s, 0.17 * s, 0.29 * s);
      ellipse(0.46 * s, -0.22 * s, 0.17 * s, 0.27 * s);
    }
    function bear(s) {
      ellipse(0, 0.50 * s, 0.72 * s, 0.46 * s);
      var tx = [-0.62, -0.32, 0, 0.32, 0.62], ty = [-0.18, -0.42, -0.52, -0.42, -0.18];
      for (var i = 0; i < 5; i++) {
        ellipse(tx[i] * s, ty[i] * s, 0.15 * s, 0.20 * s);
        ctx.beginPath();
        ctx.moveTo((tx[i] - 0.06) * s, (ty[i] - 0.16) * s);
        ctx.lineTo((tx[i] + 0.06) * s, (ty[i] - 0.16) * s);
        ctx.lineTo(tx[i] * s, (ty[i] - 0.34) * s);
        ctx.closePath(); ctx.fill();
      }
    }
    function dino(s) {
      var toes = [-0.62, 0, 0.62];
      for (var i = 0; i < 3; i++) {
        ctx.save(); ctx.rotate(toes[i]);
        ctx.beginPath();
        ctx.moveTo(-0.13 * s, 0.35 * s);
        ctx.quadraticCurveTo(-0.16 * s, -0.50 * s, 0, -0.95 * s);
        ctx.quadraticCurveTo(0.16 * s, -0.50 * s, 0.13 * s, 0.35 * s);
        ctx.closePath(); ctx.fill(); ctx.restore();
      }
      ellipse(0, 0.40 * s, 0.20 * s, 0.20 * s);
    }
    var drawers = { wolf: wolf, bear: bear, dino: dino };
    var animals = ['wolf', 'bear', 'dino'];

    var prints = [], tick = 0, last = null, raf = null;

    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (var i = 0; i < prints.length; i++) {
        var p = prints[i];
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle + Math.PI / 2);
        ctx.globalAlpha = p.alpha * 0.8;
        ctx.fillStyle = GOLD;
        drawers[p.animal](p.s);
        ctx.restore();
      }
    }
    function frame() {
      var alive = false;
      for (var i = prints.length - 1; i >= 0; i--) {
        var p = prints[i];
        p.age++;
        if (p.age <= 6) p.alpha = p.age / 6;                 // fade in
        else if (p.age > 40) p.alpha = Math.max(0, 1 - (p.age - 40) / 34);  // fade out
        if (p.age > 74) { prints.splice(i, 1); continue; }
        alive = true;
      }
      draw();
      raf = alive ? requestAnimationFrame(frame) : null;
    }

    window.addEventListener('mousemove', function (e) {
      var x = e.clientX, y = e.clientY;
      if (last) {
        var dx = x - last.x, dy = y - last.y;
        if (dx * dx + dy * dy >= 46 * 46) {                  // one print per ~46px
          var ang = Math.atan2(dy, dx);
          var lat = (tick % 2 ? 1 : -1) * 9;                 // alternate paw
          prints.push({
            animal: animals[tick % 3],
            x: x - Math.sin(ang) * lat,
            y: y + Math.cos(ang) * lat,
            angle: ang + rand(-0.1, 0.1),
            s: rand(16, 20), alpha: 0, age: 0
          });
          if (prints.length > 50) prints.shift();
          tick++;
          if (!raf) raf = requestAnimationFrame(frame);
        }
      }
      last = { x: x, y: y };
    });
  })();
</script>
